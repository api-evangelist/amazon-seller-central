aid: amazon-seller-central
name: Amazon Selling Partner API
description: >-
  The Amazon Selling Partner API (SP-API) is the modern REST-based API that
  enables Amazon sellers, vendors, and third-party developers to programmatically
  access Seller Central data and operations including catalog management,
  orders, inventory, pricing, fulfillment, reports, finances, notifications,
  and advertising. SP-API uses Login with Amazon (LWA) OAuth 2.0 access tokens
  for authentication and replaces the legacy Amazon Marketplace Web Service
  (MWS).
