apis:
  - aid: amazon-seller-central:sp-api
    name: Amazon Selling Partner API (SP-API)
    description: >-
      REST API that lets approved developers and sellers manage Amazon
      Selling Partner accounts including catalog items, listings, orders,
      shipments, inventory, pricing, fees, reports, feeds, finances,
      notifications, and FBA operations. Authentication uses Login with
      Amazon (LWA) OAuth 2.0 access tokens passed via the
      x-amz-access-token header.
    humanURL: https://developer-docs.amazon.com/sp-api
    baseURL: https://sellingpartnerapi-na.amazon.com
    tags:
